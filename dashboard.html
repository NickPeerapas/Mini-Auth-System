<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Mini-Auth-System</h1>
            <div>
                <h2>Hello <h2 id="dashboard-header-username">Nick</h2></h2>
                <button id="logout-button">Logout</button>
            </div>
        </header>

        <div class="container">
            <div class="dashboard-card">
                <h1> Welcome to Dashboard </h1>
                <h2> You are successfully logged in </h2>
                <div><h2>Username : <h2 id="dashboard-card-username">username</h2></h2></div>
                <div><h2>Email : <h2 id="dashboard-card-email">email</h2></h2></div>
            </div>
        </div>
        <script src="dashboard.js"></script>
    </div>
</body>

</html>
